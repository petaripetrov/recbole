# Environment settings
save_sst_embed: True

# Data settings
LABEL_FIELD: label
threshold: {'rating': 3.0}
sst_attr_list: ["gender"]
load_col:
  inter: [user_id,item_id,rating]
  user: [user_id,gender,age,occupation]

# model config
embedding_size: 64
dis_hidden_size_list: [128, 256, 128, 128, 64, 32]
activation: leakyrelu
filter_mode: none # TODO this is different from PMF
dis_dropout: 0.3 

# training settings
train_epoch_interval: 5
weight_decay: 0.0001
dis_weight: 10
training_neg_sample_num: 
  uniform: 1

# evalution settings
eval_args:
  split: {'RS':[8,1,1]}
  group_by: user
  order: RO
  mode: uni100
popularity_ratio: 0.1